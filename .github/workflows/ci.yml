name: CI

on:
  push:
    branches: [main, "feature/**", "fix/**", "refactor/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff==0.9.0
      - run: ruff check speakerscribe/ tests/
      - run: ruff format --check speakerscribe/ tests/

  notebook-parity:
    name: Notebook parity check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Check both notebooks
        run: python scripts/check_notebook_parity.py

  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package (dev extras)
        run: pip install -e ".[dev]"
      - name: Run unit tests (no integration, no gpu)
        run: pytest tests/ -v -m "not integration and not gpu"

  integration:
    name: Integration tests (ffmpeg)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install package (dev extras)
        run: pip install -e ".[dev]"
      - name: Run integration tests
        run: pytest tests/ -v -m "integration"
